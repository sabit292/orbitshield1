<!DOCTYPE html>
<html>
<head>
<title>OrbitShield PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

<h1 class="title">🚀 ORBITSHIELD</h1>

<div class="main-circle" id="mainCircle">
    <p>KP INDEX</p>
    <h1 id="kp">0</h1>
    <div id="risk">LOW</div>
</div>

<div class="grid">

<div class="card"><h3>Türkiye Saati</h3><p id="time"></p></div>
<div class="card"><h3>6 Saat Tahmin</h3><p id="pred"></p></div>
<div class="card"><h3>Etki Alanı</h3><p id="region"></p></div>

<div class="card"><h3>Solar Wind</h3><p id="wind"></p></div>
<div class="card"><h3>Solar Flare</h3><p id="flare"></p></div>

<div class="card"><h3>GPS</h3><p id="gps"></p></div>
<div class="card"><h3>Uydu</h3><p id="sat"></p></div>
<div class="card"><h3>Elektrik</h3><p id="power"></p></div>

</div>

<div class="chart-card">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
